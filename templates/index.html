<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blood Group Detection Using Fingerprint</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
}

.container{
    width:90%;
    max-width:600px;
    background:white;
    padding:35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.4);
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.icon{
    font-size:70px;
    margin-bottom:10px;
}

h1{
    color:#dc2626;
    margin-bottom:10px;
}

.subtitle{
    color:#555;
    margin-bottom:25px;
}

.upload-box{
    border:3px dashed #2563eb;
    padding:30px;
    border-radius:15px;
    cursor:pointer;
    transition:0.3s;
}

.upload-box:hover{
    background:#f1f5f9;
}

input[type=file]{
    display:none;
}

.preview{
    margin-top:20px;
}

.preview img{
    width:220px;
    border-radius:10px;
    display:none;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

button{
    margin-top:25px;
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 30px;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
    transform:scale(1.05);
}

#loading{
    display:none;
    margin-top:15px;
    color:#2563eb;
    font-weight:bold;
}

.footer{
    margin-top:20px;
    color:gray;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="icon">🩸</div>

<h1>Blood Group Detection</h1>

<p class="subtitle">
Upload a fingerprint pattern image
</p>

<form action="/predict"
      method="POST"
      enctype="multipart/form-data"
      onsubmit="showLoading()">

<label for="fingerprint">

<div class="upload-box">
📁 Click Here To Upload Fingerprint
</div>

</label>

<input type="file"
       id="fingerprint"
       name="fingerprint"
       accept="image/*"
       onchange="previewImage(event)"
       required>

<div class="preview">
<img id="preview">
</div>

<button type="submit">
🔍 Predict Blood Group
</button>

<div id="loading">
⏳ Analyzing Fingerprint...
</div>

</form>

<div class="footer">
Blood Group Detection
</div>

</div>

<script>

function previewImage(event)
{
    let preview = document.getElementById("preview");

    preview.src = URL.createObjectURL(event.target.files[0]);

    preview.style.display = "block";
}

function showLoading()
{
    document.getElementById("loading").style.display="block";
}

</script>

</body>
</html>
